<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Photo & Media Geolocation - Wan-Lin Hu</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #27ae60; --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #2980b9; }
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        #sidebar { width: 400px; display: flex; flex-direction: column; background: var(--panel); border-right: 1px solid #333; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        #map { flex-grow: 1; position: relative; }
        .section-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 15px; }
        .control-group { margin-bottom: 12px; padding: 10px; background: #252525; border-radius: 8px; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 3px; }
        select, input, .btn-main { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; cursor: pointer; font-size: 13px; box-sizing: border-box; }
        .btn-main { background: var(--primary); border: none; font-weight: bold; margin-top: 5px; }
        .btn-export { background: var(--accent); margin-top: 8px; display: none; }

        #progress-container { width: 100%; background: #000; height: 10px; border-radius: 5px; margin: 10px 0; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.2s; }

        #log-console { background: #000; color: #0f0; padding: 8px; font-family: monospace; font-size: 10px; height: 60px; overflow-y: auto; border-radius: 4px; flex-shrink: 0; }
        #chart-container { background: #000; border-radius: 8px; padding: 5px; height: 140px; border: 1px solid #333; flex-shrink: 0; margin-top: 10px; }
        #file-list { margin-top: 10px; }
        .item { display: flex; align-items: center; gap: 10px; background: #2a2a2a; margin-bottom: 8px; padding: 6px; border-radius: 6px; cursor: pointer; border-left: 5px solid #c0392b; font-size: 12px; }
        .item.matched { border-left-color: var(--primary); }
        .item .thumb-container { width: 45px; height: 45px; position: relative; background: #000; overflow: hidden; border-radius: 3px; }
        .item img, .item video { width: 100%; height: 100%; object-fit: cover; }
        .video-icon { position: absolute; bottom: 2px; right: 2px; font-size: 10px; background: rgba(0,0,0,0.7); padding: 1px 3px; border-radius: 2px; color: white; }
        .map-thumb { border: 2px solid white; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); object-fit: cover; background: #000; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin:0; color:white; font-size: 1.4em;">時空對位分析工具</h2>
    <p style="font-size:11px; color:#666; margin:0 0 10px 0;">Creator: Wan-Lin Hu | 地學踏查專用</p>

    <div id="log-console">系統日誌：等待導入資料夾...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>

    <div class="section-title">1. 時間校準設定</div>
    <div class="control-group">
        <label>媒體時間讀取來源</label>
        <select id="timeSrc">
            <option value="name" selected>依據檔案名稱 (YYYYMMDD_HHMMSS)</option>
            <option value="sys">依據檔案系統時間</option>
        </select>
        <label style="margin-top:10px;">GPX 時區偏移 (台灣選 +8)</label>
        <select id="gpxTz">
            <option value="0">UTC +0 (標準/Garmin)</option>
            <option value="8" selected>UTC +8 (台灣 / 日本-1)</option>
            <option value="2">UTC +2 (歐洲夏令時)</option>
        </select>
    </div>

    <div class="section-title">2. 資料導入 (支援 WebP/JPG/MP4)</div>
    <button class="btn-main" onclick="document.getElementById('dirInput').click()">📁 選取專案資料夾</button>
    <input type="file" id="dirInput" webkitdirectory directory multiple style="display:none;">

    <div class="section-title">3. 高度剖面分析</div>
    <div id="chart-container"><canvas id="elevationChart"></canvas></div>

    <div class="section-title">4. 成果導出</div>
    <div class="control-group">
        <input type="text" id="projectName" placeholder="專案名稱 - 日期">
        <select id="exportFormat" style="margin-top:5px;"><option value="kmz">KMZ (包含多媒體打包)</option><option value="kml">KML (純文本)</option></select>
    </div>
    <button class="btn-main btn-export" id="exportBtn">💾 執行導出 (KMZ/KML)</button>

    <div class="section-title">5. 多媒體列表 (點擊地圖同步)</div>
    <div id="file-list"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    const map = L.map('map', { zoomControl: false }).setView([23.5, 121], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    let gpxPoints = [], rawMediaFiles = [], chart, objectUrls = [];
    const photoGroup = L.featureGroup().addTo(map);
    const trackGroup = L.featureGroup().addTo(map);
    const leaderLines = L.featureGroup().addTo(map);
    let hoverMarker = L.circleMarker([0,0], {radius: 7, color: 'red', fillColor: 'white', fillOpacity: 1, weight: 3}).addTo(map);

    function log(msg) {
        const c = document.getElementById('log-console');
        c.innerHTML += `> ${msg}<br>`;
        c.scrollTop = c.scrollHeight;
    }

    function updateProgress(percent) {
        const pc = document.getElementById('progress-container');
        const pb = document.getElementById('progress-bar');
        pc.style.display = 'block';
        pb.style.width = percent + '%';
        if (percent >= 100) setTimeout(() => pc.style.display = 'none', 1000);
    }

    function parseMediaTime(file, source) {
        if (source === 'name') {
            const regex = /(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/;
            const m = file.name.match(regex);
            if (m) return new Date(m[1], m[2]-1, m[3], m[4], m[5], m[6]).getTime();
        }
        return file.lastModified;
    }

    function calcDist(p1, p2) {
        const R = 6371;
        const dLat = (p2.lat - p1.lat) * Math.PI / 180;
        const dLon = (p2.lon - p1.lon) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180) * Math.cos(p2.lat*Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    document.getElementById('dirInput').onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        objectUrls.forEach(url => URL.revokeObjectURL(url));
        objectUrls = [];

        log(`讀取專案中...`);
        const gpxFiles = files.filter(f => f.name.toLowerCase().endsWith('.gpx'));
        // 核心更新：加入 webp 支援
        const mediaFiles = files.filter(f => /\.(jpg|jpeg|png|webp|mp4)$/i.test(f.name));
        const timeSrc = document.getElementById('timeSrc').value;
        const tz = parseInt(document.getElementById('gpxTz').value);

        gpxPoints = []; rawMediaFiles = [];
        trackGroup.clearLayers(); photoGroup.clearLayers(); leaderLines.clearLayers();
        document.getElementById('file-list').innerHTML = '';

        for (let f of gpxFiles) {
            const xml = new DOMParser().parseFromString(await f.text(), "text/xml");
            const trkpts = xml.getElementsByTagName("trkpt");
            let dist = 0; const pts = [];
            for (let i = 0; i < trkpts.length; i++) {
                const pt = trkpts[i];
                const lat = parseFloat(pt.getAttribute("lat")), lon = parseFloat(pt.getAttribute("lon"));
                const ele = pt.getElementsByTagName("ele")[0] ? parseFloat(pt.getElementsByTagName("ele")[0].textContent) : 0;
                const time = new Date(pt.getElementsByTagName("time")[0].textContent).getTime() + (tz * 3600000);
                if (i > 0) dist += calcDist(pts[i-1], {lat, lon});
                pts.push({ lat, lon, ele, time, dist });
            }
            gpxPoints = gpxPoints.concat(pts);
            L.polyline(pts.map(p => [p.lat, p.lon]), {color: '#3498db', weight: 4}).addTo(trackGroup);
        }

        if (gpxPoints.length > 0) {
            document.getElementById('projectName').value = `Project - ${new Date(gpxPoints[0].time).toISOString().split('T')[0]}`;
            initChart(gpxPoints);
        }

        const locationMap = new Map();

        for (let i = 0; i < mediaFiles.length; i++) {
            const f = mediaFiles[i];
            const pTime = parseMediaTime(f, timeSrc);
            const isVideo = f.name.toLowerCase().endsWith('.mp4');
            const url = URL.createObjectURL(f);
            objectUrls.push(url);

            let closest = gpxPoints.length > 0 ? gpxPoints.reduce((p, c) => Math.abs(c.time - pTime) < Math.abs(p.time - pTime) ? c : p) : null;
            const isOk = closest && Math.abs(closest.time - pTime) < 1200000;

            if (isOk) {
                let finalLat = closest.lat, finalLon = closest.lon;
                const key = `${finalLat.toFixed(5)},${finalLon.toFixed(5)}`;

                if (locationMap.has(key)) {
                    finalLat += (Math.random() - 0.5) * 0.0006;
                    finalLon += (Math.random() - 0.5) * 0.0006;
                    L.polyline([[closest.lat, closest.lon], [finalLat, finalLon]], {color: '#888', weight: 1, dashArray: '5, 5'}).addTo(leaderLines);
                } else {
                    locationMap.set(key, 1);
                }

                const icon = L.divIcon({
                    html: isVideo ? `<div class="map-thumb" style="width:40px; height:40px; color:white; display:flex; align-items:center; justify-content:center;">🎥</div>` : `<img src="${url}" class="map-thumb" style="width:40px; height:40px;">`,
                    iconSize: [40, 40], className: ''
                });
                const m = L.marker([finalLat, finalLon], {icon}).addTo(photoGroup);
                m.bindPopup(`<b>${f.name}</b><br>${isVideo ? `<video src="${url}" controls style="width:250px"></video>` : `<img src="${url}" style="width:250px">`}`);

                rawMediaFiles.push({ file: f, lat: finalLat, lon: finalLon, ele: closest.ele, isVideo });
            }

            const div = document.createElement('div');
            div.className = `item ${isOk ? 'matched' : ''}`;
            div.innerHTML = `<div class="thumb-container">${isVideo ? '<video src="'+url+'"></video><span class="video-icon">MP4</span>' : '<img src="'+url+'">'}</div><div><b>${f.name}</b><br><span>${isOk ? '對位成功' : '時間不匹配'}</span></div>`;
            document.getElementById('file-list').appendChild(div);
            if(isOk) div.onclick = () => { map.flyTo([finalLat, finalLon], 17); };

            updateProgress(((i + 1) / mediaFiles.length) * 100);
        }

        if (gpxPoints.length > 0) {
            map.fitBounds(trackGroup.getBounds());
            document.getElementById('exportBtn').style.display = 'block';
            log(`導入完成！${rawMediaFiles.length} 個媒體已對位`);
        }
    };

    async function doExport() {
        const zip = new JSZip();
        const fmt = document.getElementById('exportFormat').value;
        const projName = document.getElementById('projectName').value || "Project";
        updateProgress(10);

        let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${projName}</name><Placemark><name>Track</name><LineString><coordinates>${gpxPoints.map(p => `${p.lon},${p.lat},${p.ele}`).join(' ')}</coordinates></LineString></Placemark>`;

        for (let i = 0; i < rawMediaFiles.length; i++) {
            const m = rawMediaFiles[i];
            const path = fmt === 'kmz' ? `media/${m.file.name}` : m.file.name;
            const desc = m.isVideo ? `<video src="${path}" width="400" controls/>` : `<img src="${path}" width="400"/>`;
            kml += `<Placemark><name>${m.file.name}</name><description><![CDATA[${desc}]]></description><Point><coordinates>${m.lon},${m.lat},${m.ele}</coordinates></Point></Placemark>`;
            if (fmt === 'kmz') zip.file(`media/${m.file.name}`, await m.file.arrayBuffer());
            updateProgress(10 + (i / rawMediaFiles.length) * 80);
        }
        kml += `</Document></kml>`;

        if (fmt === 'kmz') {
            zip.file("doc.kml", kml);
            saveFile(await zip.generateAsync({type:"blob"}), `${projName}.kmz`);
        } else {
            saveFile(new Blob([kml], {type: "application/vnd.google-earth.kml+xml"}), `${projName}.kml`);
        }
        updateProgress(100);
    }

    function saveFile(blob, name) {
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
    }

    document.getElementById('exportBtn').onclick = doExport;

    function initChart(pts) {
        if (chart) chart.destroy();
        const ctx = document.getElementById('elevationChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: pts.map(p => p.dist.toFixed(2)),
                datasets: [{ data: pts.map(p => p.ele), borderColor: '#3498db', backgroundColor: 'rgba(52,152,219,0.2)', fill: true, pointRadius: 0, borderWidth: 2 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { ticks: { color: '#666', font: {size: 10} } } },
                onHover: (e, elements) => { if (elements.length > 0) hoverMarker.setLatLng([pts[elements[0].index].lat, pts[elements[0].index].lon]); }
            }
        });
    }
</script>
</body>
</html>
